services:
  postgres:
    image: postgres:12.2-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - data:/var/lib/postgresql/data

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ec"
      - |
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama
        exec /nakama/nakama \
          --name nakama1 \
          --database.address postgres:localdb@postgres:5432/nakama \
          --logger.level INFO \
          --console.username admin \
          --console.password "2026cmpt756"
    healthcheck:
      test: [ "CMD", "/nakama/nakama", "healthcheck" ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./data:/nakama/data

  admin-api:
    build:
      context: ../../services/admin-api
    depends_on:
      - nakama
    environment:
      NAKAMA_HOST: nakama
      NAKAMA_API_PORT: 7350
      NAKAMA_CONSOLE_PORT: 7351
      TELEMETRY_MODE: async
    ports:
      - "8000:8000"

volumes:
  data:
